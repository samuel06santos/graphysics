<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add_circle,delete,do_not_disturb_on,toggle_on" />
    <link rel="stylesheet" href="style.css">
    <!-- KaTeX for rendering LaTeX equations -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <link rel="icon" type="image/png" href="./public/images/graphysics-logo.png">

    <!-- SEO -->
    <meta name="description" content="GraPhysics é um simulador interativo de campos elétricos para a web, que combina computação gráfica em canvas HTML5 com física realista em JavaScript. Crie e remova cargas pontuais, visualize vetores do campo elétrico, exiba mapas de potencial (heatmap) e meça valores locais com um multímetro virtual. Ideal para estudantes e professores de Física, o simulador oferece uma experiência didática, responsiva e totalmente livre de plugins." />
    <meta name="keywords" content="simulador de campos elétricos, visualização física na web, JavaScript e Canvas, KaTeX, Tailwind CSS, Font Awesome, ferramenta didática de eletrostática, multímetro virtual, heatmap potencial, GraPhysics" />

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "GraPhysics - Simulador de Campos Elétricos",
        "url": "https://samuel06santos.github.io/graphysics/",
        "logo": "https://samuel06santos.github.io/graphysics/public/images/graphysics-logo.png",
        "description": "Simulador interativo que combina computação gráfica em canvas HTML5 com física realista, permitindo a visualização de vetores de campo elétrico, mapas de potencial e medição via multímetro virtual.",
        "applicationCategory": "EducationApplication",
        "operatingSystem": "All",
        "browserRequirements": "Modern browsers supporting Canvas and JavaScript",
        "featureList": [
            "Adicionar/remover cargas pontuais",
            "Exibir vetores com opacidade ajustável",
            "Mapa de potencial em heatmap",
            "Multímetro virtual para medir valores locais",
            "Interface responsiva baseada em Tailwind CSS"
        ],
        "offers": {
            "@type": "Offer",
            "price": "0.00",
            "priceCurrency": "USD",
            "availability": "https://schema.org/InStock"
        },
        "author": {
            "@type": "Person",
            "name": "Samuel Santos",
            "url": "https://github.com/samuel06santos"
        }
    }
    </script>

    <title>Simulador de Campos Elétricos &bullet; GraPhysics</title>
</head>
<body id="appRoot" class="flex flex-col md:flex-row m-0 text-white font-sans bg-[#1e1e1e] h-[100dvh] overflow-hidden relative">
    <div id="ui"
        class="flex flex-col p-2 pb-3 m-2 gap-4 rounded-lg border border-gray-400 select-none w-auto md:w-85 shrink-0 overflow-y-auto bg-[#2e2e2e] md:h-[calc(100dvh-1rem)]">

        <div class="gap-2">
            <img src="./public/images/graphysics-logo.png" alt="logo" class="w-16 h-16 mx-auto">
            <h1 class="text-center text-4xl font-bold text-white">GraPhysics</h1>
            <h2 class="text-center text-lg text-gray-300">Simulador de Campos Elétricos</h2>
        </div>

        <div class="flex flex-col gap-2 gap-2">
            <h3>Controles</h3>
            <label for="materialSelect" class="text-sm text-gray-400 ml-2">Material entre as cargas:</label>
            <select id="materialSelect" aria-label="select"
                class="cursor-pointer flex justify-center items-center text-white text-center p-2 mb-4 gap-2 border border-white rounded-xl bg-indigo-600/30 hover:bg-indigo-700/30 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </select>
            <button id="addPos"
                class="cursor-pointer flex justify-center items-center p-2 gap-2 border border-white rounded-xl bg-red-600 hover:bg-red-700">
                <i class="fa-solid fa-circle-plus"></i>
                Carga Positiva
            </button>
            <button id="addNeg"
                class="cursor-pointer flex justify-center items-center p-2 gap-2 border border-white rounded-xl bg-blue-600 hover:bg-blue-700">
                <i class="fa-solid fa-circle-minus"></i>
                Carga Negativa
            </button>
            <button id="clear"
                class="cursor-pointer flex justify-center items-center p-2 gap-2 border border-white rounded-xl bg-gray-600 hover:bg-gray-700">
                <i class="fa-solid fa-trash"></i>
                Limpar Cargas
            </button>
        </div>

        <div class="flex flex-col gap-2">
            <h3>Visualização</h3>
            <button id="toggleVectors"
                class="cursor-pointer flex justify-center items-center p-2 gap-2 border border-white rounded-xl bg-slate-600/40 hover:bg-slate-700/40">
                <i class="fa-solid fa-arrow-up-long rotate-45"></i>
                <span id="spanVetores">Vetores com opacidade</span>
            </button>
            <button id="toggleHeatmap"
                class="cursor-pointer flex justify-center items-center p-2 gap-2 border border-white rounded-xl bg-fuchsia-600/40 hover:bg-fuchsia-700/40">
                <i class="fa-solid fa-fire"></i>
                <span id="spanHeatmap">Desativar Mapa de Potencial</span>
            </button>
            <button id="toggleSensor"
                class="cursor-pointer flex justify-center items-center p-2 gap-2 border border-white rounded-xl bg-yellow-600/40 hover:bg-yellow-700/40">
                <i class="fa-solid fa-gauge-high"></i>
                <span id="spanMultimetro">Desativar Multímetro</span>
            </button>
        </div>


        <footer class="flex flex-col text-center text-sm text-gray-400 mt-auto">
            <span>
                GraPhysics &bullet;
              <a href="https://www.github.com/samuel06santos/" target="_blank" class="text-white-800 hover:underline hover:text-purple-300">
                <i class="fa-brands fa-github"></i>
                Samuel Santos
              </a>
                &bullet; 2026
            </span>
        </footer>
    </div>

    <canvas id="simCanvas"
        class="flex-1 min-w-0 min-h-0 cursor-crosshair border-2 m-2 mt-0 md:mt-2 border-[#333] bg-[#000]"
    ></canvas>

    <div id="menuCarga" class="hidden fixed bg-gray-800 border border-gray-400 rounded-lg shadow-lg z-50">
        <!-- informacoes sobre a carga -->
        <div id="infoCargaContainer" class="flex flex-col px-4 mx-1 border bg-gray-700 rounded-md mb-2">
            <p id="labelCarga" class="katex text-sm text-gray-300"></p>
            <p id="infoCarga" class="text-sm text-gray-300"></p>
            <p id="posicaoXCarga" class="text-sm text-gray-300"></p>
            <p id="posicaoYCarga" class="text-sm text-gray-300"></p>
        </div>
        <button id="btnMoverCarga" class="w-full px-4 py-2 text-white hover:bg-blue-600 text-left text-sm rounded-lg flex items-center gap-2">
            <i class="fa-solid fa-arrows-up-down-left-right"></i>
            Mover Carga
        </button>
        <button id="btnRemoverCarga" class="w-full px-4 py-2 text-white hover:bg-red-600 text-left text-sm rounded-lg flex items-center gap-2">
            <i class="fa-solid fa-trash"></i>
            Remover Carga
        </button>
    </div>

    <!-- Painel do potencial (renderização LaTeX) -->
    <div id="painelPotencial" class="hidden" aria-hidden="true"></div>

    <script src="app.js"></script>
</body>
</html>
